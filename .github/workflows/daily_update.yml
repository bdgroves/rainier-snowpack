name: Daily Snowpack Update

on:
  schedule:
    # 8:00 AM Pacific = 16:00 UTC (PST) or 15:00 UTC (PDT)
    # Using 16:00 UTC to cover PST (winter/snowpack season)
    - cron: "0 16 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  update:
    name: Fetch · Analyze · Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install pixi
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      # 3. Fetch SNOTEL data
      - name: Fetch SNOTEL
        run: pixi run fetch

      # 4. Run R analysis
      - name: R analysis
        run: pixi run analyze

      # 5. Copy plots into dashboard folder
      - name: Copy outputs to dashboard
        run: |
          cp outputs/basin_swe_timeseries.png dashboard/
          cp outputs/all_stations_swe.png dashboard/
          cp outputs/station_swe_bars.png dashboard/
          cp data/processed/snotel_latest.json dashboard/
          cp data/processed/basin_daily.csv dashboard/

      # 6. Commit updated data + deploy dashboard
      - name: Commit and push
        run: |
          git config user.name  "snowpack-bot[bot]"
          git config user.email "snowpack-bot@users.noreply.github.com"
          git add data/processed/ outputs/ dashboard/
          git diff --staged --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push
