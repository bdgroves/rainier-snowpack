name: Daily Snowpack Update
on:
  schedule:
    - cron: "0 * * * *"   # Every hour
  workflow_dispatch:
jobs:
  update:
    name: Fetch · Analyze · Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true
      - name: Write Earthdata netrc
        env:
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
        run: |
          echo "machine urs.earthdata.nasa.gov" > ~/.netrc
          echo "login ${EARTHDATA_USERNAME}" >> ~/.netrc
          echo "password ${EARTHDATA_PASSWORD}" >> ~/.netrc
          chmod 600 ~/.netrc
          echo "EARTHDATA_TOKEN=${EARTHDATA_TOKEN}" >> $GITHUB_ENV
      - name: Fetch SNOTEL
        run: pixi run fetch
      - name: Fetch hourly temps
        run: pixi run fetch-hourly
      - name: Fetch stream gauges
        run: pixi run fetch-gauges
      - name: Fetch MODIS snow cover
        run: pixi run fetch-modis
      - name: R analysis
        run: pixi run analyze
      - name: Copy outputs to dashboard
        run: |
          cp outputs/basin_swe_timeseries.png dashboard/
          cp outputs/all_stations_swe.png dashboard/
          cp outputs/station_swe_bars.png dashboard/
          cp outputs/modis_snow_cover.png dashboard/
          cp data/processed/snotel_latest.json dashboard/
          cp data/processed/basin_daily.csv dashboard/
          cp data/processed/hourly_temps.json dashboard/
          cp data/processed/modis/modis_latest.json dashboard/
          cp data/processed/gauges_latest.json dashboard/
      - name: Commit and push
        run: |
          git config user.name  "snowpack-bot[bot]"
          git config user.email "snowpack-bot@users.noreply.github.com"
          git add data/processed/ outputs/ dashboard/ data/modis_archive/
          git diff --staged --quiet || git commit -m "data: hourly update $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
